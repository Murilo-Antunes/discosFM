<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiscosFM</title>
</head>
<body>
    <section class="esquerda">
        <header class="side-menu">
            <img src="" alt="icone">
            <p class="marca">DiscosFM</p>
            <p class="light">Reimagine</p>
        </header>

        <button class="quick-search" type="search"></button>

        <nav>       
            <button class="nav">
                <img src="#" alt="" class="img-nav"> 
                <p class="p-nav">Home</p>
            </button>

            <button class="nav">
                <img src="#" alt="" class="img-nav"> 
                <p class="p-nav">Coleção</p>
            </button>

            <button class="nav">
                <img src="#" alt="" class="img-nav"> 
                <p class="p-nav">Wantlist</p>
            </button>

            <button class="nav">
                <img src="#" alt="" class="img-nav"> 
                <p class="p-nav">Marketplace</p>
            </button>

            <button class="nav">
                <img src="#" alt="" class="img-nav"> 
                <p class="p-nav">Settings</p>
            </button>
        </nav>
    </section>
    <section class="direita">
        <header class="main">
            <button class="search" type="search"></button>
            <div class="usuario-utilites-header">
                <button class="notificacao"></button>
                <button class="perfil-header"></button>
            </div>
        </header>

        <main>
            <p>// EXPLORE</p>
            <div class="titulo-container">
                <h1 class="titulo-principal">

                </h1>

                <div class="numero-registros-albuns-container">
                    <img src="#" alt="">
                    <p>4.100.234 albuns registrados</p>
                </div>
            </div>

            <div class="trending-container">
                <h2 class="treding">Discos em alta</h2>
                <p class="movimentacao-preco">Ultimas 24h · movimentação</p>

                <div class="treding-list">

                </div>
            </div>


            <article class="explorar-container">
                <div class="context-explorar">
                    <h1>Descubra Novos Albuns</h1>
                    <p>Com base nos seus gostos</p>

                    <div class="filtro">
                        <button class="drop-filter">Filtro</button>
                        <div class="filtragem-options">
                            <ul class="lista-filtros">
                                <li>Rock Progressivo</li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="explorar-list">
                    
                </div>
            </article>
        </main>
    </section>
</body>
</html>
