<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="view-transition" content="same-origin">
    <title>DiscosFM</title>

    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/variables.css">
    <link rel="stylesheet" href="style/home.css">
    <link rel="stylesheet" href="style/aside.css">
    <link rel="stylesheet" href="style/card-selected.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,300,0,0&icon_names=home" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    

    <script src="javascript/main.js" defer></script>
    <script src="javascript/estilo.js" defer></script>
    <script src="javascript/card.js" defer></script>
</head>
<body>
    <aside>
        <header class="side-menu">
            <div class="item-container">
                <i class="fa-solid fa-bullseye" style="color: rgb(0, 0, 0);"></i>
            </div>
            <div class="p-header">
                <p class="marca">DISCOFM</p>
                <p class="light">REIMAGINE</p>
                
            </div>
        </header>

        <a class="pesquisa-rapida-link" href="#">
            <button class="searchbox-nav">
                <i class="fa-brands fa-sistrix"></i>
                <p class="quick-search">Quick search</p>
                <p class="ctrl">Ctrl+K</p>
            </button>
        </a>
        <nav>
            <ul>
                <li>
                    <button id="home" class="nav">
                        <i class="fa-solid fa-house"></i>
                        <p class="p-nav">Home</p>
                    </button>
                </li>
                <li>
                    <button id="colecao" class="nav">
                        <i class="fa-solid fa-bullseye" ></i>
                        <p class="p-nav">Coleção</p>
                    </button>
                </li>
                <li>
                    <button id="wantlist" class="nav">
                        <i class="fa-regular fa-heart"></i>
                        <p class="p-nav">Wantlist</p>
                    </button>
                </li>
                <li>
                    <button id="marketplace" class="nav">
                        <i class="fa-brands fa-magento" ></i>
                        <p class="p-nav">Marketplace</p>
                    </button>
                </li>
                <li>
                    <button id="settings" class="nav">
                        <i class="fa-solid fa-gear"></i>
                        <p class="p-nav">Settings</p>
                    </button>
                </li>
            </ul>
        </nav>
    </aside>

    <section class="direita">
        <div id="home-container" class="home">
            <header class="main">
                <form class="searchbox" onsubmit="chamarFuncao(1); return false;">
                    <i class="fa-brands fa-sistrix"></i>
                    <input id="search" class="search" type="search" placeholder="Search artists, albums, labels, catalog numbers…">
                </form>

                <div class="usuario-utilites-header">
                    <button class="notificacao">
                         <i class="fa-regular fa-bell"></i>
                    </button>

                    <button class="perfil-header">
                        <i class="fa-regular fa-user"></i>
                    </button>
                </div>
            </header>

            <main>
                <p class="section-context">// EXPLORAR</p>
                <div class="titulo-container">
                    <h1 class="titulo-principal">Todas as músicas que <span class="bold">define você</span>, conectadas.</h1>
                    <div class="numero-registros-albuns-container">
                        <i class="fa-regular fa-star"></i>
                        <p>4.100.234 albuns registrados</p>
                    </div>
                </div>

                <div class="trending-container">
                    <h2 class="treding">Discos em alta</h2>
                    <p class="movimentacao-preco">Últimas 24h · movimentação</p>

                    <div id="trending-list" class="trending-list">
                    </div>
                </div>

                <article id="explorar-container" class="explorar-container">
                    <div class="context-explorar">
                        <div class="explorar-title">
                            <h1>Descubra Novos Albuns</h1>
                            <p>Com base nos seus gostos</p>
                        </div>
                        <div class="filtro">
                            <button class="drop-filter">
                                    <i class="fa-solid fa-sliders"></i>
                                    Filtro
                            </button>

                            <div class="filtragem-options">
                                <ul class="lista-filtros">
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div id="explorer-list" class="explorar-list">

                    </div>

                    <div class="troca-pagina">
                        <div class="button-troca-pagina">
                            <a href="#explorar-container"><button id="btn-prev" class="btn-prev"> < </button></a>
                            <a href="#explorar-container"><button id="btn-next" class="btn-next"> > </button></a>
                        </div>
                        <p id="info" class="info"> Página 5 de 10</p>
                    </div>
                </article>
            </main>
        </div>

        <div id="card-selected" class="card-selected">
        </div>
    </section>

</body>
</html>
